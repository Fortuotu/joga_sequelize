<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Article</title>
</head>
<body>

<div class="form-container">
    <h2>Edit Article</h2>
    <form id="editForm" method="POST">
        
        <div class="form-group">
            <label for="id">Article ID to Update</label>
            <input type="number" id="article_id_input" name="id" placeholder="Enter ID (e.g. 1)" required>
        </div>

        <div class="form-group">
            <label for="name">Name</label>
            <input type="text" id="name" name="name" placeholder="New article name">
        </div>

        <div class="form-group">
            <label for="slug">Slug</label>
            <input type="text" id="slug" name="slug" placeholder="new-slug-path">
        </div>

        <div class="form-group">
            <label for="image">Image</label>
            <input type="text" id="image" name="image" placeholder="image.jpg">
        </div>

        <div class="form-group">
            <label for="body">Content</label>
            <textarea id="body" name="body" placeholder="Update article body..."></textarea>
        </div>

        <button type="submit" class="btn-submit">Update Article</button>
        <button type="button" id="btn-delete">Delete Article</button>
    </form>

    <script>
        const form = document.getElementById('editForm');
        const idInput = document.getElementById('article_id_input');

        const deleteBtn = document.getElementById('btn-delete');

        deleteBtn.addEventListener('click', function() {
            const id = idInput.value;

            fetch(`/admin/article/edit/${id}`, {
                method: 'DELETE',
            })
            .then(response => {
                if (response.ok) {
                    window.location.reload();
                }
            })
            .catch(err => console.error("Delete Error:", err));
        });
            
        form.addEventListener('submit', function(e) {
            const id = idInput.value;

            form.action = `/admin/article/edit/${id}`;
        });
    </script>
</div>

</body>
</html>
